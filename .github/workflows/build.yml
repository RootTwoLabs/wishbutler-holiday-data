name: Build holiday data

on:
  workflow_dispatch:
  schedule:
    # Monthly refresh so precomputed tables keep a long look-ahead window.
    - cron: '0 3 1 * *'

# #135: Default least-privilege; nur der build-Job erhaelt Schreibrechte.
# (GitHub-Permissions sind job-granular; ein voller read-only-generate /
#  write-publish Split ueber Artifacts ist der naechste Schritt.)
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # #123: Actions auf volle Commit-SHA gepinnt (statt beweglicher Major-Tags).
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20

      # #124: npm ci erzwingt exakt das Lockfile (reproduzierbar; schlaegt bei Drift fehl).
      - run: npm ci

      - name: Generate data
        run: npm run build

      - name: Validate
        run: npm run validate

      - name: Commit data changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/ CREDITS.md)" ]]; then
            git add data/ CREDITS.md
            git commit -m "chore(data): refresh holiday packages [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # #127: Purge verifizieren + retryen statt `|| true`; bei endgueltigem
      # Fehlschlag eine sichtbare Warnung (sonst sehen Clients bis 12h ein stale Manifest).
      - name: Purge jsDelivr cache for the manifest
        if: steps.commit.outputs.changed == 'true'
        env:
          REPO: ${{ github.repository }}
        run: |
          url="https://purge.jsdelivr.net/gh/${REPO}@main/data/index.json"
          ok=false
          for attempt in 1 2 3; do
            resp=$(curl -s -w $'\n%{http_code}' "$url" || true)
            code=$(printf '%s' "$resp" | tail -n1)
            body=$(printf '%s' "$resp" | sed '$d')
            if [ "$code" = "200" ] && printf '%s' "$body" | grep -qiE 'success|"status"'; then
              echo "Purge ok: $body"; ok=true; break
            fi
            echo "Purge attempt $attempt failed (HTTP $code): $body"; sleep 5
          done
          if [ "$ok" != true ]; then
            echo "::warning::jsDelivr purge failed after 3 attempts - clients may see a stale manifest for up to 12h"
          fi

      - name: Tag release
        run: |
          TAG="data-$(date +%Y%m%d-%H%M%S)"
          git tag "$TAG"
          git push origin "$TAG"
