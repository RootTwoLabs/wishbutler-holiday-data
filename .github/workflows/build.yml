name: Build holiday data

on:
  workflow_dispatch:
  schedule:
    # Monthly refresh so precomputed tables keep a long look-ahead window.
    - cron: '0 3 1 * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - run: npm install

      - name: Generate data
        env:
          CALENDARIFIC_API_KEY: ${{ secrets.CALENDARIFIC_API_KEY }}
        run: npm run build

      - name: Validate
        run: npm run validate

      - name: Commit data changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/ CREDITS.md)" ]]; then
            git add data/ CREDITS.md
            git commit -m "chore(data): refresh holiday packages [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Purge jsDelivr cache for the manifest
        # jsDelivr caches `@main` URLs for up to 12h. The manifest (index.json)
        # is the single mutable entrypoint the app reads, so purge it right after
        # pushing new data — otherwise clients keep seeing the stale country list.
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -sf "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/data/index.json" || true

      - name: Tag release
        run: |
          TAG="data-$(date +%Y%m%d-%H%M%S)"
          git tag "$TAG"
          git push origin "$TAG"
